<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세이프포켓 로그인</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #00468D;
      background-image: url('https://placehold.co/1920x1080/00305f/001f40');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* ───── 전체 래퍼 ───── */
    .login-wrapper {
      width: 100%;
      max-width: 668px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ───── 로고 ───── */
    .login-logo {
      width: 100%;
      max-width: 506px;
    }

    .login-logo img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ───── 카드 ───── */
    /* 원본: w:668 h:401, padding-x:81px, padding-top:68px, padding-bottom:60px */
    .login-card {
      width: 100%;
      background-color: rgba(255, 255, 255, 0.07);
      padding: 68px 81px 60px;
      display: flex;
      flex-direction: column;
    }

    /* ───── 입력 필드 공통 ───── */
    .input-group {
      position: relative;
    }

    .input-group + .input-group {
      margin-top: 16px;
    }

    .input-group input {
      width: 100%;
      height: 52px;
      background: transparent;
      border: 1px solid rgba(247, 247, 247, 0.78);
      padding: 0 20px 0 56px;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #F7F7F7;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input::placeholder {
      color: rgba(247, 247, 247, 0.6);
    }

    .input-group input:focus {
      border-color: #F7F7F7;
    }

    /* ───── 입력 필드 아이콘 ───── */
    .input-icon {
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    /* ───── 로그인 버튼 ───── */
    /* 원본: y:643, ID input y:469+52=521, PW input y:537+52=589 → 버튼까지 54px 간격 */
    .btn-login {
      width: 100%;
      height: 52px;
      background-color: rgba(153, 210, 255, 0.78);
      border: none;
      margin-top: 54px;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #F7F7F7;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-login:hover {
      background-color: rgba(153, 210, 255, 0.95);
    }

    .btn-login:active {
      background-color: rgba(153, 210, 255, 1);
    }

    /* ───── 비밀번호 재설정 ───── */
    /* 원본: 버튼 하단(y:695)과 텍스트(y:722) 사이 27px 간격, 우측 정렬 */
    .forgot-password {
      display: flex;
      justify-content: flex-end;
      margin-top: 27px;
    }

    .forgot-password a {
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #F7F7F7;
      text-decoration: none;
      opacity: 0.78;
      transition: opacity 0.2s;
    }

    .forgot-password a:hover {
      opacity: 1;
      text-decoration: underline;
    }

    /* ───── 반응형 ───── */
    @media (max-width: 768px) {
      .login-card {
        padding: 48px 40px 44px;
      }

      .btn-login {
        margin-top: 36px;
      }
    }

    @media (max-width: 480px) {
      .login-wrapper {
        padding: 16px;
        gap: 24px;
      }

      .login-card {
        padding: 32px 24px 32px;
      }

      .input-group input {
        font-size: 14px;
        height: 48px;
      }

      .btn-login {
        height: 48px;
        font-size: 14px;
        margin-top: 28px;
      }

      .forgot-password {
        margin-top: 20px;
      }

      .forgot-password a {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">

    <!-- 로고 -->
    <div class="login-logo">
      <img
        src="https://placehold.co/506x51/ffffff22/ffffff?text=SafePocket+Logo"
        alt="세이프포켓 로고"
      />
    </div>

    <!-- 로그인 카드 -->
    <div class="login-card">

      <!-- 아이디 입력 -->
      <div class="input-group">
        <span class="input-icon">
          <!-- account icon -->
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="7" r="3.5" stroke="#F7F7F7" stroke-width="1.5"/>
            <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="#F7F7F7" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="아이디 입력"
          autocomplete="username"
        />
      </div>

      <!-- 비밀번호 입력 -->
      <div class="input-group">
        <span class="input-icon">
          <!-- lock icon -->
          <svg width="16" height="21" viewBox="0 0 16 21" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="9" width="14" height="11" rx="2" stroke="#F7F7F7" stroke-width="1.5"/>
            <path d="M4 9V6a4 4 0 018 0v3" stroke="#F7F7F7" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="비밀번호 입력"
          autocomplete="current-password"
        />
      </div>

      <!-- 로그인 버튼 -->
      <button class="btn-login" type="button">로그인</button>

      <!-- 비밀번호 재설정 -->
      <div class="forgot-password">
        <a href="#">비밀번호 재설정</a>
      </div>

    </div>
  </div>
</body>
</html>
