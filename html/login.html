<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>세이프포켓 로그인</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="login_wrapper">

      <!-- 로고 -->
      <div class="login_logo">
        <span class="logo_text">SafePocket</span>
      </div>

      <!-- 로그인 카드 -->
      <div class="login_card">

        <!-- 아이디 -->
        <div class="input_group">
          <span class="input_icon">
            <img src="../images/ico_loginuser.svg" alt="아이디" width="20" height="20" />
          </span>
          <input type="text" id="username" placeholder="아이디 입력" autocomplete="username" />
        </div>

        <!-- 비밀번호 -->
        <div class="input_group">
          <span class="input_icon">
            <img src="../images/ico_loginpwd.svg" alt="비밀번호" width="16" height="21" />
          </span>
          <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password" />
        </div>

        <!-- 로그인 버튼 -->
        <button class="btn_login" type="button">로그인</button>

        <!-- 비밀번호 재설정 -->
        <!-- <div class="forgot_password">
          <a href="#">비밀번호 재설정</a>
        </div> -->

      </div>
    </div>
  </body>
</html>
